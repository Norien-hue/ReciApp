server.port=3000
server.address=0.0.0.0

# MySQL — localhost funciona si la API se ejecuta desde WSL (donde Docker mapea el puerto)
# Si ejecutas la API desde Windows, cambia localhost por la IP de WSL: wsl hostname -I
spring.datasource.url=jdbc:mysql://localhost:3306/reciInventario_db?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=clase1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - no alterar esquema existente
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
# Respetar nombres exactos de tablas/columnas (MySQL en Linux es case-sensitive)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# JSON - no fallar con campos vacios
spring.jackson.default-property-inclusion=non_null

# Incluir mensajes de error en respuestas HTTP
server.error.include-message=always

# JWT
app.jwt.secret=reciapp-secret-key-cambiar-en-produccion
app.jwt.expiration-ms=604800000

# Body size para imagenes base64
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=50MB
